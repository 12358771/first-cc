<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 人格测试 · 星图档案馆</title>
<!-- 字体：使用系统原生字体栈，避免 Google Fonts 被屏蔽 -->
<style>
  /* ============================================================
     星图档案馆 — 设计令牌
     ============================================================ */
  :root {
    --void: #06090F;
    --void-lift: #0B1021;
    --card-bg: rgba(14, 18, 32, 0.82);
    --card-border: rgba(255, 255, 255, 0.06);
    --gold: #C9A96E;
    --gold-dim: #8B7348;
    --gold-glow: rgba(201, 169, 110, 0.18);
    --text: #E8E4DD;
    --text-muted: #8A8578;
    --text-dim: #544F48;

    /* 四维度的星辰色彩 */
    --dim-ei-l: #64B5F6;
    --dim-ei-r: #7C4DFF;
    --dim-sn-l: #4DB6AC;
    --dim-sn-r: #FF8A65;
    --dim-tf-l: #5C6BC0;
    --dim-tf-r: #F06292;
    --dim-jp-l: #FFD54F;
    --dim-jp-r: #4FC3F7;

    --radius: 14px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ============================================================
     星空背景 + 噪点纹理
     ============================================================ */
  body {
    font-family: "Noto Serif SC", "Songti SC", "PingFang SC", "Microsoft YaHei UI", Georgia, serif;
    background: var(--void);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  /* 星场层 */
  .stars-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    25% { opacity: 0.9; }
    50% { opacity: 0.2; }
    75% { opacity: 0.7; }
  }

  /* 噪点纹理覆盖层 */
  .grain-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  /* 大星云光晕 */
  .nebula {
    position: fixed; pointer-events: none; z-index: 0;
    border-radius: 50%; filter: blur(120px); opacity: 0.06;
  }
  .nebula-1 { width: 500px; height: 500px; background: #7C4DFF; top: -15%; left: -20%; }
  .nebula-2 { width: 400px; height: 400px; background: #C9A96E; bottom: -10%; right: -15%; }
  .nebula-3 { width: 300px; height: 300px; background: #4DB6AC; top: 40%; left: 50%; }

  /* ============================================================
     主卡片
     ============================================================ */
  .app {
    position: relative; z-index: 2;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 44px 38px 36px;
    width: 440px;
    max-width: 93vw;
    box-shadow:
      0 0 0 1px var(--card-border),
      0 24px 80px rgba(0, 0, 0, 0.6),
      inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  /* 卡片顶部装饰金线 */
  .app::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 1px;
  }

  /* ============================================================
     页面过渡
     ============================================================ */
  .page {
    display: none;
    animation: pageIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .page.active { display: block; }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ============================================================
     开始页
     ============================================================ */
  .start-wrapper { text-align: center; }

  /* 星座图标 — 纯 CSS 六芒星 */
  .constellation-icon {
    width: 72px; height: 72px;
    margin: 0 auto 18px;
    position: relative;
  }
  .constellation-icon::before {
    content: '✦';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; color: var(--gold);
    text-shadow: 0 0 40px var(--gold-glow), 0 0 80px var(--gold-glow);
    animation: iconPulse 3s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%, 100% { text-shadow: 0 0 30px var(--gold-glow), 0 0 60px var(--gold-glow); }
    50% { text-shadow: 0 0 50px var(--gold-glow), 0 0 100px var(--gold-glow); }
  }

  .start-title {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 29px; font-weight: 700; letter-spacing: 3px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .start-subtitle {
    font-size: 15px; color: var(--text-muted);
    margin-bottom: 24px; line-height: 1.8; letter-spacing: 0.3px;
    font-style: italic;
  }

  /* 维度标签 */
  .dimension-pills {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px;
  }
  .dimension-pill {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    padding: 8px 18px;
    border-radius: 30px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--gold-dim);
    transition: all 0.3s;
  }
  .dimension-pill:hover {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 20px var(--gold-glow);
  }

  /* ============================================================
     按钮系统
     ============================================================ */
  .btn {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    border: none; border-radius: var(--radius-sm);
    padding: 13px 32px;
    cursor: pointer; transition: all 0.25s; outline: none;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #C9A96E 0%, #A8864B 100%);
    color: #0B0F16; width: 100%;
    box-shadow: 0 4px 24px rgba(201, 169, 110, 0.25);
    position: relative; overflow: hidden;
  }
  .btn-primary::after {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }
  .btn-primary:hover::after { left: 100%; }
  .btn-primary:hover {
    box-shadow: 0 6px 32px rgba(201, 169, 110, 0.4);
    transform: translateY(-1px);
  }

  .btn-outline {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 11px 22px;
    font-size: 11px; letter-spacing: 1.5px;
  }
  .btn-outline:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: rgba(201, 169, 110, 0.05);
  }
  .btn-outline:disabled {
    opacity: 0.25; cursor: not-allowed; border-color: rgba(255,255,255,0.05);
  }

  .btn-ghost {
    background: none; color: var(--text-dim);
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 14px; font-weight: 400; letter-spacing: 0.5px;
    text-transform: none; padding: 8px 16px;
    margin-top: 14px;
    text-decoration: underline;
    text-decoration-color: transparent;
    text-underline-offset: 4px;
    transition: all 0.3s;
  }
  .btn-ghost:hover {
    color: var(--gold);
    text-decoration-color: var(--gold-dim);
  }

  /* ============================================================
     答题页
     ============================================================ */
  .quiz-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .quiz-progress-text {
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 12px; color: var(--text-dim); letter-spacing: 1px;
  }
  .quiz-dimension {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: var(--gold); background: rgba(201,169,110,0.08);
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid rgba(201,169,110,0.15);
  }

  /* 进度条 — 金线风格 */
  .progress-container {
    height: 3px; background: rgba(255,255,255,0.04);
    border-radius: 2px; margin-bottom: 28px; overflow: hidden;
    position: relative;
  }
  .progress-bar {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
    background-size: 200% 100%;
    transition: width 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    position: relative;
  }
  .progress-bar::after {
    content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold-glow);
  }

  /* 问题文本 */
  .question-text {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 20px; font-weight: 400; line-height: 1.55;
    margin-bottom: 22px; min-height: 70px;
    color: var(--text);
    letter-spacing: 0.2px;
  }

  /* 选项 */
  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

  .option-btn {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 16px 18px;
    cursor: pointer; transition: all 0.25s; text-align: left;
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    color: var(--text-muted); font-size: 15px;
    position: relative;
  }
  .option-btn:hover {
    border-color: rgba(201, 169, 110, 0.35);
    background: rgba(201, 169, 110, 0.04);
    color: var(--text);
  }
  .option-btn.selected {
    border-color: var(--gold);
    background: rgba(201, 169, 110, 0.08);
    color: var(--text);
    box-shadow: 0 0 28px var(--gold-glow), inset 0 0 28px rgba(201,169,110,0.03);
  }

  .option-letter {
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
    border-radius: 50%;
    width: 30px; height: 30px; display: flex; align-items: center;
    justify-content: center;
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    transition: all 0.25s;
  }
  .option-btn.selected .option-letter {
    background: var(--gold);
    color: #0B0F16;
  }
  .option-text { flex: 1; line-height: 1.55; }

  .quiz-nav { display: flex; gap: 12px; }
  .quiz-nav .btn-outline { flex: 1; text-align: center; }

  /* ============================================================
     结果页
     ============================================================ */
  .result-type {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 56px; font-weight: 900; letter-spacing: 10px;
    text-align: center; color: var(--gold);
    text-shadow: 0 0 60px var(--gold-glow), 0 0 120px rgba(201,169,110,0.12);
    margin-bottom: 2px;
    animation: typeReveal 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  @keyframes typeReveal {
    from { letter-spacing: 30px; opacity: 0; filter: blur(8px); }
    to   { letter-spacing: 10px; opacity: 1; filter: blur(0); }
  }

  .result-name {
    text-align: center; font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 15px; font-weight: 600; letter-spacing: 4px;
    color: var(--text-dim); margin-bottom: 24px;
    text-transform: uppercase;
  }

  .divider-ornament {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 22px; opacity: 0.5;
  }
  .divider-ornament .line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .divider-ornament .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold); flex-shrink: 0;
  }

  /* 维度条形图 */
  .dimension-bars { margin-bottom: 20px; }
  .dim-bar-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 9px;
  }
  .dim-bar-label {
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 11px; font-weight: 700; width: 22px; text-align: center; flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .dim-bar-track {
    flex: 1; height: 22px; background: rgba(255,255,255,0.03);
    border-radius: 11px; display: flex; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .dim-bar-fill {
    height: 100%; transition: width 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
    position: relative;
  }
  .dim-bar-fill::after {
    content: ''; position: absolute; top: 3px; bottom: 3px; width: 1px;
    background: rgba(255,255,255,0.2);
  }
  .dim-bar-fill.left::after { right: 4px; }
  .dim-bar-fill.right::after { left: 4px; }

  .dim-bar-percent {
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 10px; color: var(--text-dim); width: 44px; text-align: center; flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  /* 描述卡片 */
  .result-desc {
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px; padding: 18px;
    font-size: 14px; line-height: 1.8; color: var(--text-muted);
    margin-bottom: 16px; letter-spacing: 0.3px;
    font-style: italic;
  }

  /* 优势/劣势双栏 */
  .result-traits {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;
  }
  .trait-box {
    border-radius: 10px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.012);
  }
  .trait-box h4 {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    margin-bottom: 8px; text-transform: uppercase;
  }
  .trait-box.strengths h4 { color: #7EBF8A; }
  .trait-box.weaknesses h4 { color: #D4786E; }
  .trait-box ul {
    font-size: 13px; color: var(--text-muted); padding-left: 16px; line-height: 2;
    list-style: none;
  }
  .trait-box ul li::before {
    content: '·'; margin-right: 6px; color: var(--text-dim);
  }

  /* ============================================================
     弹窗系统
     ============================================================ */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    justify-content: center; align-items: center;
    background: rgba(6, 9, 15, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .overlay.show { display: flex; animation: overlayIn 0.3s ease; }
  @keyframes overlayIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .panel {
    background: var(--void-lift);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 26px;
    width: 390px; max-width: 90vw; max-height: 68vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    animation: panelIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .panel h3 {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-size: 17px; font-weight: 700; letter-spacing: 3px;
    text-align: center; color: var(--gold); margin-bottom: 18px;
    text-transform: uppercase;
  }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08); border-radius: 2px;
  }

  /* 历史记录条目 */
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
  }
  .history-item:hover { background: rgba(255,255,255,0.015); }
  .history-item:last-child { border-bottom: none; }

  .history-type {
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    font-weight: 700; font-size: 18px; letter-spacing: 4px;
    color: var(--gold);
  }
  .history-date {
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 11px; color: var(--text-dim);
  }
  .empty-hint {
    text-align: center; padding: 28px 20px;
    color: var(--text-dim); font-size: 14px; font-style: italic;
  }

  /* ============================================================
     响应式
     ============================================================ */
  @media (max-width: 480px) {
    .app { padding: 32px 20px 28px; }
    .result-type { font-size: 42px; letter-spacing: 6px; }
    @keyframes typeReveal {
      from { letter-spacing: 20px; opacity: 0; filter: blur(6px); }
      to   { letter-spacing: 6px; opacity: 1; filter: blur(0); }
    }
    .result-traits { grid-template-columns: 1fr; }
    .start-title { font-size: 24px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<!-- 星场 -->
<div class="stars-layer" id="starsLayer"></div>

<!-- 星云光晕 -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- 噪点纹理 -->
<div class="grain-overlay"></div>

<!-- ==================== 主卡片 ==================== -->
<div class="app">

  <!-- ========== 开始页 ========== -->
  <div class="page active" id="pageStart">
    <div class="start-wrapper">
      <div class="constellation-icon"></div>
      <div class="start-title">MBTI 人格测试</div>
      <div class="start-subtitle">
        穿越荣格心理学的星图，发现你的性格星座。<br>
        四个维度 · 十六种人格 · 二十道镜像之问。
      </div>
      <div class="dimension-pills">
        <span class="dimension-pill">E/I 外向·内向</span>
        <span class="dimension-pill">S/N 感觉·直觉</span>
        <span class="dimension-pill">T/F 思维·情感</span>
        <span class="dimension-pill">J/P 判断·感知</span>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">开启星图</button>
      <button class="btn btn-ghost" onclick="openHistory()">翻阅过往记录</button>
    </div>
  </div>

  <!-- ========== 答题页 ========== -->
  <div class="page" id="pageQuiz">
    <div class="quiz-header">
      <span class="quiz-progress-text" id="quizProgress">第 1/20 题</span>
      <span class="quiz-dimension" id="quizDimension">E/I</span>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="quizProgressBar" style="width:5%"></div>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="quiz-nav">
      <button class="btn btn-outline" id="btnPrev" onclick="prevQuestion()" disabled>⟵ 上一题</button>
      <button class="btn btn-outline" id="btnNext" onclick="nextQuestion()" disabled>下一题 ⟶</button>
    </div>
  </div>

  <!-- ========== 结果页 ========== -->
  <div class="page" id="pageResult">
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="divider-ornament">
      <span class="line"></span><span class="dot"></span><span class="line"></span>
    </div>
    <div class="dimension-bars" id="dimensionBars"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-traits">
      <div class="trait-box strengths">
        <h4>星辰之力</h4>
        <ul id="strengthsList"></ul>
      </div>
      <div class="trait-box weaknesses">
        <h4>暗面之影</h4>
        <ul id="weaknessesList"></ul>
      </div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin-bottom:12px">重新探索</button>
    <button class="btn btn-outline" onclick="openHistory()" style="width:100%">翻阅过往记录</button>
  </div>
</div>

<!-- ==================== 历史记录弹窗 ==================== -->
<div class="overlay" id="historyOverlay">
  <div class="panel">
    <h3>星图档案</h3>
    <div id="historyList"></div>
    <button class="btn btn-primary" onclick="closeHistory()" style="margin-top:18px">关闭</button>
  </div>
</div>

<script>
// ===================================================================
//  生成星场
// ===================================================================
(function generateStars() {
  const layer = document.getElementById('starsLayer');
  const count = 140;
  let html = '';
  for (let i = 0; i < count; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const size = Math.random() * 2 + 0.5;
    const dur = Math.random() * 4 + 3;
    const delay = Math.random() * 5;
    html += `<div class="star" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;--dur:${dur}s;--delay:${delay}s"></div>`;
  }
  layer.innerHTML = html;
})();

let currentQuestion = 0;
let answers = new Array(20).fill(null);
let selectedOption = null;

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function startQuiz() {
  currentQuestion = 0;
  answers = new Array(20).fill(null);
  selectedOption = null;
  showPage('pageQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQuestion];
  selectedOption = answers[currentQuestion];

  document.getElementById('quizProgress').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('quizDimension').textContent = q.dimension;
  document.getElementById('quizProgressBar').style.width = ((currentQuestion + 1) / 20 * 100) + '%';
  document.getElementById('questionText').textContent = q.text;

  document.getElementById('optionsContainer').innerHTML = `
    <button class="option-btn${selectedOption === 'A' ? ' selected' : ''}" id="optA" onclick="selectOption('A')">
      <span class="option-letter">A</span>
      <span class="option-text">${q.optA}</span>
    </button>
    <button class="option-btn${selectedOption === 'B' ? ' selected' : ''}" id="optB" onclick="selectOption('B')">
      <span class="option-letter">B</span>
      <span class="option-text">${q.optB}</span>
    </button>
  `;

  updateNavButtons();
}

function selectOption(opt) {
  selectedOption = opt;
  answers[currentQuestion] = opt;
  document.getElementById('optA').classList.toggle('selected', opt === 'A');
  document.getElementById('optB').classList.toggle('selected', opt === 'B');
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('btnPrev').disabled = currentQuestion === 0;
  document.getElementById('btnNext').disabled = selectedOption === null;
  document.getElementById('btnNext').textContent = currentQuestion === 19 ? '揭示结果' : '下一题 ⟶';
}

function prevQuestion() {
  if (currentQuestion > 0) { currentQuestion--; renderQuestion(); }
}

function nextQuestion() {
  if (selectedOption === null) return;
  if (currentQuestion < 19) { currentQuestion++; renderQuestion(); }
  else { showResult(); }
}

// ===================================================================
//  计分 & 结果
// ===================================================================

function calculateResult() {
  const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  for (let i = 0; i < QUESTIONS.length; i++) {
    const q = QUESTIONS[i];
    const ans = answers[i];
    if (!ans) continue;
    const side = ans === 'A' ? q.sideA : q.sideB;
    scores[side]++;
  }
  const type =
    (scores.E >= scores.I ? 'E' : 'I') +
    (scores.S >= scores.N ? 'S' : 'N') +
    (scores.T >= scores.F ? 'T' : 'F') +
    (scores.J >= scores.P ? 'J' : 'P');
  return { type, scores };
}

function showResult() {
  const { type, scores } = calculateResult();
  const p = PERSONALITIES[type];

  document.getElementById('resultType').textContent = type;
  document.getElementById('resultName').textContent = p.name;
  document.getElementById('resultDesc').textContent = p.desc;

  document.getElementById('strengthsList').innerHTML = p.strengths.map(s => `<li>${s}</li>`).join('');
  document.getElementById('weaknessesList').innerHTML = p.weaknesses.map(w => `<li>${w}</li>`).join('');

  const dimensions = [
    { left: 'E', right: 'I', dim: 'E/I' },
    { left: 'S', right: 'N', dim: 'S/N' },
    { left: 'T', right: 'F', dim: 'T/F' },
    { left: 'J', right: 'P', dim: 'J/P' },
  ];

  document.getElementById('dimensionBars').innerHTML = dimensions.map(d => {
    const leftScore = scores[d.left];
    const rightScore = scores[d.right];
    const total = leftScore + rightScore || 1;
    const leftPct = Math.round(leftScore / total * 100);
    const rightPct = 100 - leftPct;
    const colors = DIM_COLORS[d.dim];
    return `
      <div class="dim-bar-row">
        <span class="dim-bar-label" style="color:${colors.left}">${d.left}</span>
        <div class="dim-bar-track">
          <div class="dim-bar-fill left" style="width:${leftPct}%;background:${colors.left};box-shadow:0 0 12px ${colors.left}44"></div>
          <div class="dim-bar-fill right" style="width:${rightPct}%;background:${colors.right};box-shadow:0 0 12px ${colors.right}44"></div>
        </div>
        <span class="dim-bar-label" style="color:${colors.right}">${d.right}</span>
        <span class="dim-bar-percent">${leftPct}/${rightPct}</span>
      </div>
    `;
  }).join('');

  showPage('pageResult');
  saveResult(type, scores);
}

// ===================================================================
//  存储
// ===================================================================

function loadResults() {
  try { return JSON.parse(localStorage.getItem('mbti_results')) || []; }
  catch(e) { return []; }
}

function saveResult(type, scores) {
  const results = loadResults();
  const now = new Date();
  results.push({
    date: now.toISOString().slice(0, 10),
    time: now.toTimeString().slice(0, 8),
    type, scores
  });
  if (results.length > 50) results.splice(0, results.length - 50);
  localStorage.setItem('mbti_results', JSON.stringify(results));
}

function openHistory() {
  const results = loadResults().reverse();
  const container = document.getElementById('historyList');
  if (results.length === 0) {
    container.innerHTML = '<div class="empty-hint">星图档案中尚无记录，<br>完成一次测试后这里将显现你的轨迹。</div>';
  } else {
    container.innerHTML = results.map(r => {
      const p = PERSONALITIES[r.type];
      return `
        <div class="history-item">
          <div>
            <span class="history-type">${r.type}</span>
            <span style="font-size:12px;color:var(--text-dim);margin-left:10px;letter-spacing:1px">${p ? p.name : ''}</span>
          </div>
          <span class="history-date">${r.date} ${r.time}</span>
        </div>
      `;
    }).join('');
  }
  document.getElementById('historyOverlay').classList.add('show');
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('show');
}

document.getElementById('historyOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeHistory();
});

function restartQuiz() { startQuiz(); }

// ===================================================================
//  键盘快捷键
// ===================================================================

document.addEventListener('keydown', function(e) {
  const quizPage = document.getElementById('pageQuiz');
  if (!quizPage.classList.contains('active')) return;
  if (e.key === 'a' || e.key === 'A') selectOption('A');
  else if (e.key === 'b' || e.key === 'B') selectOption('B');
  else if (e.key === 'ArrowLeft') prevQuestion();
  else if (e.key === 'ArrowRight' || e.key === 'Enter') nextQuestion();
});
</script>

</body>
